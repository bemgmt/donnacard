<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">

  <title>DONNA — Operational Intelligence</title>
  <meta name="description" content="DONNA AR Business Card Experience">
  <script crossorigin="anonymous" src="./external/runtime/runtime.js"></script>
  <script crossorigin="anonymous" src="./external/xr/xr.js" async="true" data-preload-chunks="slam"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0B1B2B; }
    #overlay-text {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(54, 209, 255, 0.9);
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 18px;
      font-weight: 300;
      letter-spacing: 2px;
      text-align: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.8s ease;
      z-index: 1000;
      text-shadow: 0 0 20px rgba(54, 209, 255, 0.5);
    }
    #overlay-text.visible { opacity: 1; }
    #white-fade {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: white;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1.5s ease;
      z-index: 999;
    }
    #white-fade.active { opacity: 1; pointer-events: all; }
  </style>
</head>

<body>
<div id="overlay-text">Entering Operational Intelligence Layer</div>
<div id="white-fade"></div>
<script src="bundle.js"></script>
</body>

</html>
